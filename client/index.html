<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VibeRealm</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111; overflow: hidden; }

    /* ---------- Login Screen ---------- */
    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1b1f2b, #0d0f14);
      font-family: sans-serif;
    }
    #login-box {
      width: 300px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 32px 36px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    #login-box h1 {
      color: #fff;
      font-size: 22px;
      margin: 0 0 4px;
      text-align: center;
    }
    #login-box p.subtitle {
      color: #9ad0ff;
      font-size: 12px;
      text-align: center;
      margin: 0 0 20px;
    }
    #login-box label {
      color: #ccc;
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }
    #login-username {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      margin-bottom: 14px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #login-username:focus { border-color: #42a5f5; }
    #login-username::placeholder { color: #777; }
    #login-password-row { display: none; }
    #login-submit {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: #42a5f5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    #login-submit:hover:not(:disabled) { background: #2f8ee0; }
    #login-submit:disabled { background: #2a4a63; cursor: default; }
    #login-error {
      color: #ef5350;
      font-size: 12px;
      margin-top: 10px;
      min-height: 14px;
      text-align: center;
    }

    /* ---------- HUD ---------- */
    #hud {
      position: absolute; top: 10px; left: 10px; color: #fff;
      font-family: sans-serif; font-size: 14px; z-index: 10;
      background: rgba(0, 0, 0, 0.55); padding: 8px 12px; border-radius: 6px;
      min-width: 140px;
    }
    #hud-name { font-weight: bold; margin-bottom: 2px; }
    #xp-bar-bg { width: 160px; height: 8px; background: #333; border-radius: 4px; margin-top: 4px; overflow: hidden; }
    #xp-bar-fill { width: 0%; height: 100%; background: #4caf50; transition: width 0.2s ease-out; }
    #hud-hp-text { font-size: 11px; color: #ddd; margin-top: 6px; }
    #hud-hp-bar-bg { width: 160px; height: 8px; background: #333; border-radius: 4px; margin-top: 2px; overflow: hidden; }
    #hud-hp-fill { width: 100%; height: 100%; background: #e53935; transition: width 0.2s ease-out; }

    #target-frame {
      position: absolute; top: 10px; right: 10px; color: #fff;
      font-family: sans-serif; font-size: 14px; z-index: 10;
      background: rgba(0, 0, 0, 0.55); padding: 8px 12px; border-radius: 6px;
      min-width: 140px; display: none;
    }
    #target-name-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    #target-name { font-weight: bold; }
    #target-level { font-size: 12px; color: #ccc; }
    #target-hp-bar-bg { width: 160px; height: 8px; background: #333; border-radius: 4px; margin-top: 4px; overflow: hidden; }
    #target-hp-fill { width: 100%; height: 100%; background: #e53935; transition: width 0.2s ease-out; }
    #target-hp-text { font-size: 11px; color: #ddd; margin-top: 2px; }

    /* ---------- Action Bar (Combat MVP) ---------- */
    #action-bar {
      position: absolute; bottom: 10px; right: 10px; z-index: 10;
      font-family: sans-serif;
    }
    #attack-button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: #455a64;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    #attack-button:hover:not(:disabled) { background: #37474f; }
    #attack-button.active { background: #c62828; }
    #attack-button.active:hover:not(:disabled) { background: #b71c1c; }
    #attack-button:disabled { opacity: 0.5; cursor: default; }

    #chat-panel {
      position: absolute; bottom: 10px; left: 10px; z-index: 10;
      width: 320px; font-family: sans-serif;
    }
    #chat-log {
      height: 160px; overflow-y: auto; background: rgba(0, 0, 0, 0.5);
      border-radius: 6px 6px 0 0; padding: 6px 8px; box-sizing: border-box;
      font-size: 12px; color: #eee; line-height: 1.4;
    }
    #chat-log .chat-meta { color: #9ad0ff; }
    #chat-input {
      width: 100%; box-sizing: border-box; border: none; outline: none;
      padding: 6px 8px; font-size: 12px; background: rgba(0, 0, 0, 0.7);
      color: #fff; border-radius: 0 0 6px 6px;
    }
    #chat-input::placeholder { color: #888; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div id="login-box">
      <h1>VibeRealm</h1>
      <p class="subtitle">Enter the overworld</p>
      <form id="login-form">
        <label for="login-username">Username</label>
        <input
          id="login-username"
          type="text"
          maxlength="16"
          autocomplete="off"
          placeholder="Hero"
          autofocus
        />
        <div id="login-password-row">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="off" />
        </div>
        <button id="login-submit" type="submit">Enter World</button>
        <div id="login-error"></div>
      </form>
    </div>
  </div>

  <div id="hud">
    <div id="hud-name">Connecting...</div>
    <div id="hud-level">Level 1</div>
    <div id="xp-bar-bg"><div id="xp-bar-fill"></div></div>
    <div id="hud-hp-text">HP 0 / 0</div>
    <div id="hud-hp-bar-bg"><div id="hud-hp-fill"></div></div>
  </div>
  <div id="target-frame">
    <div id="target-name-row">
      <span id="target-name">-</span>
      <span id="target-level">Lv.1</span>
    </div>
    <div id="target-hp-bar-bg"><div id="target-hp-fill"></div></div>
    <div id="target-hp-text">0 / 0</div>
  </div>
  <div id="game"></div>
  <div id="action-bar">
    <button id="attack-button">Attack</button>
  </div>
  <div id="chat-panel">
    <div id="chat-log"></div>
    <input id="chat-input" type="text" maxlength="200" placeholder="Press Enter to chat..." autocomplete="off" />
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
